name: Nightly Slow Suite

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  slow-tests:
    name: Slow Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    env:
      PYTHONHASHSEED: "0"
      OMP_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MPLBACKEND: Agg
      BIORSP_DISABLE_PLOTTING: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -U -r requirements-dev.txt
          python -m pip install -e .

      - name: Test environment info
        run: |
          python -V
          pip freeze | head

      - name: Run slow/scientific tests
        run: pytest -q -m "slow" --durations=30 --junitxml=pytest.xml

      - name: Upload artifacts (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: slow-py${{ matrix.python-version }}
          path: |
            pytest.xml
            .pytest_cache
            test_output
            analysis/**/outputs/test
          if-no-files-found: ignore
