[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "biorsp"
version = "0.0.0"
description = "Bayesian inference and robustness tools for RSP-style analyses (placeholder)."
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "Your Name", email = "you@example.com" }]
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
requires-python = ">=3.8"
dependencies = [
    "numpy>=2.2.0",
    "scipy>=1.15.0",
    "pandas>=2.3.0",
    "matplotlib>=3.10.0",
    "scikit-learn>=1.7.0",
    "tqdm>=4.67.0",
]

[project.optional-dependencies]
# Development extras including testing, linting, and optional scientific packages
dev = [
    "pytest>=9.0.0",
    "black>=25.12.0",
    "ruff>=0.14.10",
    "flake8>=7.3.0",
    "mypy>=1.19.0",
    "pre-commit>=3.4.0",
    "isort>=7.0.0",
    "umap-learn>=0.5.5",
    "phate>=2.0.0",
    "anndata>=0.11"
]

[tool.setuptools.packages.find]
where = ["."]

[tool.pytest.ini_options]
minversion = "6.0"
addopts = "-ra -q"

[tool.ruff]
line-length = 100
exclude = ["**/*.ipynb"]

[tool.ruff.lint]
extend-ignore = ["E203"]

